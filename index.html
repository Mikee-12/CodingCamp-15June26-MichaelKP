<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- GREETING SECTION -->
  <header class="greeting-section">
    <div class="greeting-left">
      <p id="greeting-text">Good morning</p>
      <h1 id="greeting-name">Friend</h1>
    </div>
    <div class="greeting-right">
      <p id="clock">00:00:00</p>
      <p id="date-display">Monday, 1 January 2026</p>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="dashboard-grid">

    <!-- TO-DO LIST -->
    <section class="card" id="todo-section">
      <h2>To-Do List</h2>

      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="Add a new task..." maxlength="100" />
        <button id="add-todo-btn">Add</button>
      </div>

      <div class="todo-controls">
        <button class="sort-btn" id="sort-btn">⇅ Sort A–Z</button>
      </div>

      <ul id="todo-list"></ul>
      <p id="todo-empty" class="empty-msg">No tasks yet. Add one above!</p>
    </section>

    <!-- RIGHT COLUMN -->
    <div class="right-column">

      <!-- FOCUS TIMER -->
      <section class="card" id="timer-section">
        <h2>⏱ Focus Timer</h2>

        <div class="timer-settings">
          <label for="timer-duration">Duration (minutes):</label>
          <input type="number" id="timer-duration" value="25" min="1" max="60" />
        </div>

        <div id="timer-display">25:00</div>

        <div class="timer-buttons">
          <button id="timer-start">▶ Start</button>
          <button id="timer-stop">⏸ Stop</button>
          <button id="timer-reset">↺ Reset</button>
        </div>
      </section>

      <!-- QUICK LINKS -->
      <section class="card" id="links-section">
        <h2>Quick Links</h2>

        <div class="link-input-row">
          <input type="text" id="link-name" placeholder="Name (e.g. YouTube)" />
          <input type="url" id="link-url" placeholder="URL (e.g. https://youtube.com)" />
          <button id="add-link-btn">Add</button>
        </div>

        <div id="links-container"></div>
        <p id="links-empty" class="empty-msg">No links yet. Add your favorites!</p>
      </section>

    </div>
  </main>

  <!-- THEME TOGGLE -->
  <button id="theme-toggle" title="Toggle dark/light mode">🌙</button>

  <!-- NAME MODAL -->
  <div id="name-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Welcome to your Dashboard!</h2>
      <p>What's your name?</p>
      <input type="text" id="name-input" placeholder="Enter your name..." maxlength="30" />
      <button id="name-save-btn">Let's go!</button>
    </div>
  </div>

  <!-- EDIT TASK MODAL -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2>Edit Task</h2>
      <input type="text" id="edit-input" placeholder="Edit your task..." maxlength="100" />
      <div class="modal-buttons">
        <button id="edit-save-btn">Save</button>
        <button id="edit-cancel-btn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
